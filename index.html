<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Containerization and DevOps Lab</title>

<style>
    /* ===== GLOBAL STYLING ===== */
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        text-align: center;
        overflow-x: hidden;
        background: radial-gradient(circle at bottom, #0b0c2a, #000000);
    }

    /* ===== STAR BACKGROUND ===== */
    .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        background: transparent;
        z-index: -1;
    }

    .stars::after {
        content: "";
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        box-shadow:
            100px 200px white, 200px 400px white, 300px 600px white,
            400px 100px white, 500px 300px white, 600px 500px white,
            700px 200px white, 800px 400px white, 900px 600px white;
        animation: moveStars 20s linear infinite;
    }

    @keyframes moveStars {
        from { transform: translateY(0); }
        to { transform: translateY(-1000px); }
    }

    /* ===== HEADER ===== */
    h1 {
        margin-top: 40px;
        font-size: 3rem;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #00f7ff; }
        to { text-shadow: 0 0 20px #00f7ff, 0 0 30px #00f7ff; }
    }

    /* ===== CARD ===== */
    .card {
        margin: 30px auto;
        padding: 20px;
        width: 60%;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 20px rgba(0, 247, 255, 0.2);
        transition: transform 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    /* ===== BUTTON ===== */
    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 25px;
        font-size: 1rem;
        color: white;
        background: linear-gradient(45deg, #00f7ff, #0077ff);
        border: none;
        border-radius: 25px;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn:hover {
        box-shadow: 0 0 15px #00f7ff;
        transform: scale(1.1);
    }

    /* ===== FOOTER ===== */
    footer {
        margin-top: 50px;
        font-size: 0.8rem;
        opacity: 0.7;
    }

</style>
</head>

<body>

<div class="stars"></div>

<h1>🚀 Containerization & DevOps Lab</h1>

</div>

</a>
</div>

<footer>
    🌌 Built with HTML + CSS | DevOps Lab Project
</footer>

</body>
</html>
