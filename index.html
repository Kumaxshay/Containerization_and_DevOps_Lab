<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Containerization and DevOps Lab</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        text-align: center;
        background: radial-gradient(circle at bottom, #0b0c2a, #000000);
    }

    /* STAR BACKGROUND */
    .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    .stars::after {
        content: "";
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        box-shadow:
            50px 100px white, 150px 300px white, 250px 500px white,
            350px 150px white, 450px 350px white, 550px 550px white,
            650px 250px white, 750px 450px white, 850px 650px white;
        animation: moveStars 25s linear infinite;
    }

    @keyframes moveStars {
        from { transform: translateY(0); }
        to { transform: translateY(-1000px); }
    }

    h1 {
        margin-top: 40px;
        font-size: 2.5rem;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #00f7ff; }
        to { text-shadow: 0 0 20px #00f7ff, 0 0 30px #00f7ff; }
    }

    .card {
        margin: 30px auto;
        padding: 20px;
        width: 90%;
        max-width: 600px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 20px rgba(0, 247, 255, 0.2);
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 25px;
        font-size: 1rem;
        color: white;
        background: linear-gradient(45deg, #00f7ff, #0077ff);
        border-radius: 25px;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn:hover {
        box-shadow: 0 0 15px #00f7ff;
        transform: scale(1.1);
    }

    footer {
        margin-top: 40px;
        font-size: 0.8rem;
        opacity: 0.7;
    }
</style>
</head>

<body>

<div class="stars"></div>

<h1>🚀 Containerization & DevOps Lab</h1>

<div class="card">
    <h2>👨‍💻 Student Details</h2>
    <p><b>Name:</b> Akshay Kumar</p>

    <p><b>Batch:</b> 3</p>
</div>

<div class="card">

    <!-- ✅ CORRECT LINK -->
    <a href="https://github.com/Kumaxshay/Containerization_and_DevOps_Lab" target="_blank" class="btn">
        Open GitHub Repository
    </a>
</div>

<footer>
    🌌 DevOps Lab Project | Hosted on GitHub Pages
</footer>

</body>
</html>
